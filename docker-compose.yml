services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: lmc5
      POSTGRES_USER: lmc5
      POSTGRES_PASSWORD: local-only-change-me
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lmc5 -d lmc5"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  memory:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://lmc5:local-only-change-me@postgres:5432/lmc5
      LMC5_DATA_DIR: /data
      PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - memory-data:/data

volumes:
  postgres-data:
  memory-data:

